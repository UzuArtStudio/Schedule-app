<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- ★これ絶対必要 -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

<link rel="icon" href="https://uzuartstudio.github.io/Schedule-app/icon.png">
<link rel="apple-touch-icon" href="https://uzuartstudio.github.io/Schedule-app/icon.png">

<title>うず絵画教室｜出欠</title>
<style>
html {
  font-size: 16px;
}

body {
  font-family: sans-serif;
  margin: 0;
  background: #f7f7f7;
  display: flex;
  justify-content: center;
}

/* 全体 */
.container {
  max-width: 600px;
  width: 100%;
  margin-left: auto;
  margin-right: auto;
  padding: 16px;
}

/* タイトル */
h2 {
  text-align: center;
}

/* 入力欄 */
input {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

textarea {
  width: 100%;
  min-height: 90px;
  padding: 12px;
  margin-bottom: 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
  resize: vertical;
  font-family: sans-serif;
}

/* 日付ブロック */
.date-card {
  background: white;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
}

/* ボタン */
.btn-group {
  display: flex;
  gap: 8px;
  margin-top: 8px;
}

button {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
  font-weight: bold;
}

/* 月見出し */
h3 {
  margin-top: 20px;
  font-size: 16px;
  color: #666;
}

/* 送信ボタン */
.submit-btn {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  font-size: 18px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 10px;
}

/* ローディング */
#loading {
  position: fixed;
  inset: 0;
  background: white;
  display:flex;
  flex-direction: column;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.spinner {
  width:40px;
  height:40px;
  border:4px solid #ddd;
  border-top:4px solid #333;
  border-radius:50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}

/* 出欠ボタン */
.btn-group button {
  position: relative;
  background: white;
  border: 2px solid #ddd;
  color: transparent;
  height: 52px;
  transition: 0.2s;
}

/* ○ */
.btn-group button:nth-child(1)::after {
  content: "";
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 3px solid #4DA6FF;
  position: absolute;
  inset: 0;
  margin: auto;
}

/* △ */
.btn-group button:nth-child(2)::after {
  content: "";
  width: 0;
  height: 0;
  border-left: 11px solid transparent;
  border-right: 11px solid transparent;
  border-bottom: 20px solid #FFD95A;
  position: absolute;
  inset: 0;
  margin: auto;
}

/* × */
.btn-group button:nth-child(3)::before,
.btn-group button:nth-child(3)::after {
  content: "";
  width: 24px;
  height: 3px;
  background: #FFB347;
  position: absolute;
  inset: 0;
  margin: auto;
  border-radius: 999px;
}

.btn-group button:nth-child(3)::before {
  transform: rotate(45deg);
}

.btn-group button:nth-child(3)::after {
  transform: rotate(-45deg);
}

/* 選択状態 */
.btn-group button.selected {
  background: #f3f9ff;
  border-color: #4DA6FF;
  transform: scale(1.03);
}

/* 送信ボタン */
.submit-btn {
  background: #4DA6FF;
}

/* ローディング */
.spinner {
  border-top: 4px solid #4DA6FF;
}

/* 補足説明テキスト */
.sub-note{
  font-size:13px;
  color:#888;
  margin-top:-6px;
  margin-bottom:16px;
  line-height:1.5;
}

/* 参加予定人数テキスト */
.attendance-info{
  margin-top:4px;
  margin-bottom:8px;
  font-size:13px;
  color:#666;
  line-height:1.4;
}

</style>
</head>

<body>

<div id="loading">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<div class="container">

<h2>うず絵画教室 出欠</h2>

<input id="name" placeholder="お名前">
<input id="email" placeholder="メール（任意）">
<p class="sub-note">
入力内容の確認メールをお送りします
</p>

<div id="dates"></div>
<label for="note">その他追記</label>

<textarea
  id="note"
  placeholder="来室時間（例：16:30）や連絡事項など"
></textarea>

<p class="sub-note">
※レッスン当日12:00以降の変更は、
出欠フォームではなく直接ご連絡をお願いいたします。
</p>

<button class="submit-btn" onclick="submitData()">送信</button>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwYu8CFEHD3syCcQP0_lOKdpujPX6dyV5Dt85FmcD1FYYBbLSb3YN7JBXsScR60LLxl/exec";

let dates = [];
let answers = [];

// =======================
// 参加人数表示
// =======================

function getDayMessage(count){

  if(count === 0){
    return "🌱 参加予定募集中";
  }

  if(count === 1){
    return "🎨 先生独り占めDAY";
  }

  if(count === 2){
    return "✏️ じっくり制作DAY";
  }

  if(count === 3){
    return "🙌 わいわい制作DAY";
  }

  return "🌈 にぎやかアトリエDAY";
}


// =======================
// 保存
// =======================
function saveData(){
  localStorage.setItem("formData", JSON.stringify({
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    note: document.getElementById("note").value,
    answers: answers
  }));
}

// =======================
// 復元
// =======================
function loadData(){
  const saved = localStorage.getItem("formData");
  if(!saved) return null;
  return JSON.parse(saved);
}

const savedData = loadData();

fetch(API_URL)
.then(res => res.json())
.then(data => {

  const box = document.getElementById("dates");
  let currentMonth = "";

data.dates.forEach(d => {

  const display = String(d);

  const count = data.counts?.[display] || 0;
  const lesson = data.lessons?.[display] || "";
    const [m, day] = display.split("/").map(Number);

    if(currentMonth !== m){
      currentMonth = m;

      const h = document.createElement("h3");
      h.textContent = m + "月";
      box.appendChild(h);
    }

    const i = dates.length;

    dates.push(display);

    // 復元データがあれば使う
    const savedAnswer = savedData?.answers?.[i] || "";
    answers.push(savedAnswer);

    const div = document.createElement("div");
    div.className = "date-card";

div.innerHTML = `
  <div>
    <strong>${display}</strong>
    ${lesson ? "　" + lesson : ""}
  </div>

  <div class="attendance-info">
    参加予定：${count}名　|　${getDayMessage(count)}
  </div>

  <div class="btn-group">

        <button onclick="setAns(${i},'○',this)">○</button>
        <button onclick="setAns(${i},'△',this)">△</button>
        <button onclick="setAns(${i},'×',this)">×</button>
      </div>
    `;

    box.appendChild(div);

    // ボタン状態復元
    if(savedAnswer){
      const btns = div.querySelectorAll("button");
      btns.forEach(b=>{
        if(b.textContent === savedAnswer){
          b.classList.add("selected");
        }
      });
    }
  });

  // 名前・メール復元
  if(savedData){
    document.getElementById("name").value = savedData.name || "";
    document.getElementById("email").value = savedData.email || "";
    document.getElementById("note").value = savedData.note || "";
  }

  // 入力変更で保存
  document.getElementById("name").addEventListener("input", saveData);
  document.getElementById("email").addEventListener("input", saveData);
  document.getElementById("note").addEventListener("input", saveData);

  document.getElementById("loading").style.display = "none";
});

// =======================
// 回答セット
// =======================
function setAns(i,val,btn){
  answers[i]=val;

  btn.parentNode.querySelectorAll("button")
    .forEach(b=>b.classList.remove("selected"));

  btn.classList.add("selected");

  saveData(); // ←保存
}

// =======================
// 送信
// =======================
function submitData(){

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const note = document.getElementById("note").value.trim();


  if(!name){
    alert("名前を入力してください");
    return;
  }

  const hasAnswer = answers.some(a => a !== "");
  if(!hasAnswer){
    alert("１つ以上選択してください");
    return;
  }

  document.querySelector("#loading p").textContent = "送信中...";
  document.getElementById("loading").style.display = "flex";

  fetch(API_URL,{
    method:"POST",
    body:JSON.stringify({name,email,dates,note,answers})
  })
  .then(r=>r.json())
  .then(res=>{
    document.getElementById("loading").style.display = "none";

    if(res.ok){

      // 保存データ削除
      //localStorage.removeItem("formData");

      document.body.innerHTML = `
        <div style="text-align:center; margin-top:50px;">
          <h2>入力ありがとうございました</h2>
          <p>出欠を受け付けました。</p>

          <button onclick="location.reload()" style="
            margin-top:20px;
            padding:12px 20px;
            font-size:16px;
          ">
            もう一度入力する
          </button>
        </div>
      `;

    }else{
      alert("エラー："+res.error);
    }
  });
}

</script>
</body>
</html>
